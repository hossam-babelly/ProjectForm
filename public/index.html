<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EO-Dashboard — الإدارة التنفيذية | سنكري القابضة</title>
<link rel="icon" type="image/png" href="/assets/logo-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <div class="logo" aria-label="سنكري القابضة">
    <img src="/assets/logo-horizontal.png" alt="سنكري القابضة — SANKARI HOLDING">
  </div>
  <div class="title">
    <h1>لوحة الإدارة التنفيذية</h1>
    <p>مجموعة سنكري القابضة — متابعة المهام والمخرجات</p>
  </div>
  <div class="header-actions">
    <select id="profileSwitch" class="profile-switch" title="البروفايل" style="display:none"></select>
    <span class="sync" id="sync">—</span>
    <div class="bell-wrap">
      <button class="btn btn-ghost bell" id="bellBtn">🔔<span class="bell-count" id="bellCount" style="display:none">0</span></button>
      <div class="bell-panel" id="bellPanel"></div>
    </div>
    <button class="btn btn-ghost icon-only" id="addBtn" title="مهمة جديدة" style="display:none">➕</button>
    <button class="btn btn-gold icon-only" id="refreshBtn" title="تحديث">🔄</button>
    <button class="btn btn-ghost icon-only push-toggle" id="pushBtn" title="تفعيل إشعارات المتصفح" style="display:none">🖥️</button>
    <a class="btn btn-ghost icon-only" id="usersBtn" href="/users.html" title="المستخدمون" style="display:none">👥</a>
    <button class="btn btn-ghost icon-only" id="accountBtn" title="حسابي" style="display:none">⚙</button>
    <span class="user-chip" id="userChip" style="display:none"></span>
    <button class="btn btn-ghost icon-only" id="logoutBtn" title="خروج" style="display:none">🚪</button>
  </div>
</header>

<main>
  <section class="kpis" id="kpis"></section>

  <div class="toolbar">
    <div class="chips" id="timeChips"></div>
    <div class="filters">
      <div class="ms" id="msProject" data-all="المشاريع"></div>
      <div class="ms" id="msOwner" data-all="المسؤولين"></div>
      <div class="ms" id="msLinked" data-all="المرتبطين"></div>
      <div class="ms" id="msType" data-all="الأنواع"></div>
      <div class="ms" id="msPriority" data-all="الأولويات"></div>
      <div class="ms" id="msStatus" data-all="الحالات"></div>
      <input class="search" id="fSearch" type="text" placeholder="🔍 بحث في المهام...">
      <button class="btn reset" id="resetBtn">مسح الفلاتر</button>
      <button class="btn btn-gold" id="reportBtn" type="button">📄 تقرير</button>
    </div>
  </div>

  <div class="views">
    <div class="view-group" id="shapeTabs">
      <button class="view-tab active" data-shape="table">📋 جدول</button>
      <button class="view-tab" data-shape="kanban">🗂️ كانبان</button>
      <button class="view-tab" data-shape="calendar">🗓️ تقويم</button>
    </div>
    <div class="view-group" id="dataTabs">
      <button class="view-tab active" data-data="tasks">📌 مهام</button>
      <button class="view-tab" data-data="meetings">🤝 اجتماعات</button>
    </div>
    <button class="view-tab toggle" id="expandBtn" type="button" style="margin-inline-start:auto">↕ عرض موسّع</button>
    <div class="ms" id="colsWrap"><button class="view-tab toggle" id="colsBtn" type="button">⚙ الأعمدة</button><div class="ms-panel" id="colsPanel" style="inset-inline-start:auto;inset-inline-end:0;min-width:210px"></div></div>
  </div>

  <div class="count-line" id="countLine"></div>

  <div id="viewArea">
    <div class="spinner">جارٍ تحميل المهام…</div>
  </div>
</main>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <div class="modal-head">
      <h3 id="mTitle">تفاصيل المهمة</h3>
      <div class="mh-right">
        <div class="modal-head-actions" id="mHeadActions"></div>
        <button class="modal-close" id="mClose">✕</button>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<div class="modal-back" id="reportModalBack">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><h3>توليد تقرير</h3><button class="modal-close" id="reportClose">✕</button></div>
    <div class="modal-body">
      <p style="color:var(--muted);font-size:13px;margin-bottom:12px">يصدّر المهام المعروضة حالياً (حسب الفلاتر والبطاقات المختارة) بهوية سنكري.</p>
      <div class="rep-viewinfo" id="reportViewInfo"></div>
      <div id="reportColsWrap">
        <div class="rep-cols-title">الأعمدة الظاهرة في التقرير:</div>
        <div class="rep-cols" id="reportCols"></div>
      </div>
      <div class="rep-cols-title">اسم ملف التقرير:</div>
      <input id="reportName" type="text" value="تقرير-المهام" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:14px;margin-bottom:18px;color:var(--text)">
      <div class="report-btns">
        <button class="rep-btn rep-pdf" id="reportPdf" type="button">📕 تقرير PDF</button>
        <button class="rep-btn rep-word" id="reportWord" type="button">📘 تقرير Word</button>
        <button class="rep-btn rep-excel" id="reportExcel" type="button">📗 تقرير Excel</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-back" id="acctModalBack">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><h3>تعديل حسابي</h3><button class="modal-close" id="acctClose">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>البريد (اسم الدخول)</label><input id="acctEmail" type="email" disabled></div>
      <div class="form-row">
        <div class="field"><label>الاسم الأول</label><input id="acctFirst" type="text"></div>
        <div class="field"><label>الاسم الأخير</label><input id="acctLast" type="text"></div>
      </div>
      <div class="field"><label>رقم الهاتف (مع رمز الدولة، مثال: ‎+963956770724)</label><input id="acctPhone" type="tel" dir="ltr" placeholder="+963…"></div>
      <div class="field"><label>كلمة المرور (اتركها فارغة لعدم التغيير)</label>
        <div class="pw-wrap"><input id="acctPw" type="password" placeholder="••••••"><button type="button" class="pw-eye" id="acctEye">👁</button></div>
      </div>
      <div id="acctTelegram" class="rem-cal" style="display:none"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-save" id="acctSave">💾 حفظ</button><button class="btn btn-cancel" id="acctCancel">إلغاء</button></div>
  </div>
</div>

<div class="modal-back" id="mtgRemBack">
  <div class="modal" style="max-width:560px">
    <div class="modal-head"><h3 id="mtgRemTitle">تذكير الاجتماع</h3><button class="modal-close" id="mtgRemClose">✕</button></div>
    <div class="modal-body" id="mtgRemBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="/app.js"></script>
<script src="/report.js"></script>
</body>
</html>
